[build]
  publish = "."

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/book"
  to = "/novel.html"
  status = 301

[[redirects]]
  from = "/read"
  to = "/chapter-one.html"
  status = 301

[[redirects]]
  from = "/chapter-one"
  to = "/chapter-one.html"
  status = 301

[[redirects]]
  from = "/dissertation"
  to = "/MANUSCRIPT.md"
  status = 302

[[redirects]]
  from = "/github"
  to = "https://github.com/artistso"
  status = 302
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
